syntax = "proto3";

package proto;

option go_package = "github.com/petitorium/petitorium-plugin-sdk/proto";

message RequestData {
  string method = 1;
  string url = 2;
  map<string, string> headers = 3;
  string body = 4;
  string collection = 5;
  string request_name = 6;
}

message HeaderList {
  repeated string values = 1;
}

message ResponseData {
  int32 status_code = 1;
  string status = 2;
  map<string, HeaderList> headers = 3;
  string body = 4;
  int64 duration = 5;
}

message HookContext {
  RequestData request = 1;
  ResponseData response = 2;
  map<string, string> environment = 3;
  bytes config_json = 4;
  string workspace = 5;
}

message PluginInfo {
  string name = 1;
  string version = 2;
  string description = 3;
  repeated string hooks = 4;
}

message HookRequest {
  string hook_type = 1;
  HookContext context = 2;
}

message HookResponse {
  HookContext context = 1;
  string error = 2;
}

service Plugin {
  rpc GetInfo(Empty) returns (PluginInfo);
  rpc ExecuteHook(HookRequest) returns (HookResponse);
}

message Empty {}
